services:
  - type: web
    name: personal-communication
    runtime: node
    plan: free
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
    disk:
      name: app-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
